apiVersion: apps/v1
kind: Deployment
metadata:
  name: account-service
  namespace: transfer-platform
  labels:
    app: account-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: account-service
  template:
    metadata:
      labels:
        app: account-service
    spec:
      containers:
        - name: account-service
          image: account-service:0.1.0
          ports:
            - containerPort: 8081
          env:
            - name: PORT
              value: "8081"
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8081
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8081
            initialDelaySeconds: 20
            periodSeconds: 10
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: account-service
  namespace: transfer-platform
spec:
  # ClusterIP: account-service is internal only — reachable by transfer-service, not the public internet.
  type: ClusterIP
  selector:
    app: account-service
  ports:
    - port: 8081
      targetPort: 8081
