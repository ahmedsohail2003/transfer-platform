name: CI

on:
  push:
    branches: [main, "codex/**"]
  pull_request:

jobs:
  test:
    name: Test ${{ matrix.service }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: [account-service, transfer-service]

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven
          cache-dependency-path: ${{ matrix.service }}/pom.xml

      - name: Build and test
        run: mvn --batch-mode --no-transfer-progress verify --file "${{ matrix.service }}/pom.xml"

  deployment-config:
    name: Validate deployment configuration
    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Validate Docker Compose configuration
        run: docker compose config --quiet

      - name: Validate Kubernetes manifests
        uses: docker://ghcr.io/yannh/kubeconform:v0.7.0
        with:
          entrypoint: /kubeconform
          args: >-
            -strict
            -summary
            k8s/namespace.yaml
            k8s/account-service.yaml
            k8s/transfer-service.yaml
