spring.application.name=transfer-service

# Bind to the port the host provides (cloud platforms inject PORT); default to 8080 locally.
server.port=${PORT:8080}

# --- account-service location (this service moves money by calling it over HTTP) ---
account-service.url=${ACCOUNT_SERVICE_URL:http://localhost:8081}

# --- Actuator: expose only the health endpoint over HTTP (used as a deploy health check) ---
management.endpoints.web.exposure.include=health

# --- Embedded H2 database (in-memory; resets on restart, zero setup required) ---
# This service stores only Transfer rows; account balances live in account-service.
spring.datasource.url=jdbc:h2:mem:transferdb;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# Entity -> DTO mapping happens inside the service, so Open-Session-In-View is unnecessary.
spring.jpa.open-in-view=false

# --- Logging ---
logging.level.com.ahmedsohail.transferservice=INFO
logging.pattern.console=%d{HH:mm:ss.SSS} %-5level [%logger{0}] %msg%n
