spring.application.name=account-service

# Bind to the port the host provides (cloud platforms inject PORT); default to 8081 locally.
server.port=${PORT:8081}

# --- Actuator: expose only the health endpoint over HTTP (used as a deploy health check) ---
management.endpoints.web.exposure.include=health

# --- Embedded H2 database (in-memory; resets on restart, zero setup required) ---
spring.datasource.url=jdbc:h2:mem:accountdb;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# Entity -> DTO mapping happens inside the service transaction, so Open-Session-In-View is unnecessary.
spring.jpa.open-in-view=false

# --- Logging ---
logging.level.com.ahmedsohail.accountservice=INFO
logging.pattern.console=%d{HH:mm:ss.SSS} %-5level [%logger{0}] %msg%n
